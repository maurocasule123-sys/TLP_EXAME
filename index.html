<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataVision AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0a0f2c;
color:white;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 80px;
background:#0d1333;
}

.logo{
font-size:22px;
font-weight:bold;
}

nav ul{
display:flex;
gap:30px;
list-style:none;
color:#cbd5e1;
}

.button{
padding:10px 18px;
border-radius:20px;
border:1px solid #334155;
background:blue;
color:white;
margin-left:10px;
cursor:pointer;
}

.button:hover{
 
border-radius:20px;
border:1px solid #0369f7;
background:transparent;
color:white;
cursor:pointer;
}

.start{
background:linear-gradient(90deg,#ff7a00,#5b7cff);
border:none;
}
 
.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:60px;
max-width:900px;
margin-bottom:20px;
}

.gradient{
background:linear-gradient(90deg,#ff7a00,#5b7cff);
-webkit-background-clip:text;
color:transparent;
}

.hero p{
color:#94a3b8;
font-size:20px;
margin-bottom:40px;
}

.search-box{
display:flex;
background:#111936;
padding:10px;
border-radius:40px;
width:700px;
max-width:90%;
}

.search-box input{
flex:1;
background:transparent;
border:none;
color:white;
padding:10px;
outline:none;
}

.search-box button{
background:#3b82f6;
border:none;
padding:12px 25px;
border-radius:30px;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<nav>
<div class="logo">Site de Tarefas</div>

<ul>
<li>Titular:</li>
<li>MAURO CASSULE</li> 
</ul>

<div class="nav-btns">
<a href="pag/trimestre1.html" class="button">Iº Trimestre</a>
<a href="pag/trimestre2.html" class="button">IIº Trimestre</a>
<a href="pag/trimestre3.html" class="button">IIIº Trimestre</a>
</div>
</nav>

<section class="hero">

<h1>Seja bem vindo<span class="gradient"> ao meu Site</span> de tarefas de TLP</h1>

<p>Todos as tarefas dos trimestres serão encontradas aqui.</p>

<div class="search-box">
<input type="text" placeholder="Escreva qualquer coisa...">
<button>Enviar</button>
</div>

</section>

</body>
</html>
